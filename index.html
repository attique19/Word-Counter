<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styling.css">
    <title>Document</title>
</head>
<body>
    <h1>Counting Words From Text </h1>
    <div class="box">

        <textarea name="input" id="data"></textarea>
        <button id="btn">Count Data</button>
    </div>
    <div class="box2">
        <p><b>Words:</b> <span id="words">0</span></p>
        <p><b>Characters:</b> <span id="chrts">0</span></p>
        <p><b>Characters (Without Spaces):</b> <span id="chsp">0</span></p>
        <p><b>Reading Time:</b> <span id="rdtm">0</span> minutes</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
